{% extends 'base.html' %}

{% block title %}Server Error - Eyedentity Eyewear{% endblock %}

{% block content %}
<section class="section error-section">
    <div class="container">
        <div class="error-content">
            <div class="error-icon">
                <i class="bi bi-exclamation-triangle"></i>
            </div>
            <div class="error-code">500</div>
            <h1 class="error-title">Server Error</h1>
            <p class="error-text">Something went wrong on our end. Please try again in a moment.</p>
            <a href="{% url 'home' %}" class="btn btn-primary btn-lg">
                <i class="bi bi-house"></i>
                Go Home
            </a>
        </div>
    </div>
</section>

<style>
.error-section {
    min-height: 72vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-primary);
}

.error-content {
    text-align: center;
    max-width: 560px;
    margin: 0 auto;
}

.error-icon {
    width: 96px;
    height: 96px;
    background: rgba(239, 68, 68, 0.06);
    border: 1px solid rgba(239, 68, 68, 0.2);
    border-radius: var(--radius-xl);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 2rem;
}

.error-icon i {
    font-size: 3rem;
    color: #ef4444;
}

.error-code {
    font-family: var(--font-display);
    font-size: 7rem;
    font-weight: 800;
    color: var(--text-faint);
    line-height: 1;
    margin-bottom: 1rem;
    letter-spacing: -0.05em;
}

.error-title {
    font-size: 2rem;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 1rem;
    letter-spacing: -0.02em;
}

.error-text {
    font-size: 1.05rem;
    color: var(--text-secondary);
    margin-bottom: 2.5rem;
    line-height: 1.7;
}
</style>
{% endblock %}
